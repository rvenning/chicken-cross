<style>
  /* Game theme + game-specific styles; shared primitives come from gamekit. */
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: #1c2a33; font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
    user-select: none; -webkit-user-select: none; touch-action: none; color: #fff;
    -webkit-touch-callout: none; overscroll-behavior: none;
  }
  canvas { position: fixed; inset: 0; margin: auto; display: block; background: #6bbf4a;
           touch-action: none; }

  /* ---------- Screens (variants on top of gamekit .screen) ---------- */
  .screen.opaque { background:
      radial-gradient(120% 80% at 50% -10%, #a9e6ff 0%, #6fc3f0 40%, #3f9be0 100%); }
  .screen.game { background: transparent; pointer-events: none; }

  /* ---------- Map / worlds ---------- */
  .player-chip { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.95);
                 color:#12232e; border-radius:16px; padding:8px 14px; font-weight:800; font-size:17px; }
  .player-chip .pmeta { font-weight:600; font-size:13px; opacity:.75; }
  .world-card { background:rgba(255,255,255,.96); color:#12232e; border-radius:20px;
                padding:16px; margin:14px 0; box-shadow:0 8px 0 rgba(0,0,0,.12);
                background-image: linear-gradient(180deg, var(--wa,#eee) 0%, #ffffff 60%); }
  .world-card.locked { filter:grayscale(.6) opacity(.7); }
  .world-head { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
  .world-emoji { font-size:34px; }
  .world-name { font-weight:900; font-size:20px; }
  .world-tag { font-size:13px; opacity:.7; }
  .world-count { margin-left:auto; font-weight:800; opacity:.8; }
  .dots { display:flex; gap:10px; flex-wrap:wrap; }
  .lvl-dot { width:46px; height:46px; border-radius:13px; border:none; font-size:16px; font-weight:900;
             cursor:pointer; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .lvl-dot small { font-size:9px; line-height:1; margin-top:1px; }
  .lvl-dot.done { background:#43c65a; box-shadow:0 4px 0 #2f9a41; }
  .lvl-dot.next { background:#ffb32b; box-shadow:0 4px 0 #d98e12; animation:pulse 1.2s infinite; }
  .lvl-dot.locked { background:#b8c0c8; box-shadow:0 4px 0 #8d97a1; cursor:not-allowed; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

  /* ---------- Game HUD ---------- */
  #gbar { position:fixed; top:0; left:0; right:0; display:flex; align-items:center; gap:10px;
          padding: calc(12px + env(safe-area-inset-top)) 14px 12px; pointer-events:none; }
  #gbar .iconbtn { pointer-events:auto; }
  #gbar .pill { pointer-events:none; background:rgba(0,0,0,.35); border-radius:14px;
                padding:8px 14px; font-weight:900; font-size:18px; color:#fff;
                text-shadow:0 2px 0 rgba(0,0,0,.3); }
  #g-progress { flex:1; text-align:center; }

  /* result modal stars/coins */
  .stars { font-size:40px; letter-spacing:6px; margin:8px 0; }
  .bigscore { font-size:44px; font-weight:900; margin:4px 0; }

  /* ---------- Touch devices (game-specific; kit covers the rest) ---------- */
  @media (pointer: coarse) {
    .lvl-dot { width:56px; height:56px; font-size:18px; border-radius:16px; }
    .lvl-dot small { font-size:11px; }
  }
</style>

<script>
/* =========================================================================
   Chicken Cross — single-file Crossy-Road-style game
   Modules: Storage · Sfx · Levels · Game (canvas) · App (screens)
   ========================================================================= */
(() => {
"use strict";

/* ---------------------------------------------------------------- Storage */
// gamekit storage: localStorage source of truth + Firestore family sync.
// Same data keys (cc_*) and Firestore collection as before the migration,
// so existing profiles and scores carry straight over.
const Storage = GK.createStorage({
  prefix: "cc",
  collection: "chickencross",
  firebaseConfig: {
    apiKey: "AIzaSyD1h2aN_9spXt8usZ_ycpGFnIIGztESXWk",
    authDomain: "wordvoyage-e5a5c.firebaseapp.com",
    projectId: "wordvoyage-e5a5c",
    storageBucket: "wordvoyage-e5a5c.firebasestorage.app",
    messagingSenderId: "569011992319",
    appId: "1:569011992319:web:bdcd6019d112006b5cbeca"
  },
  blankProgress: () => ({ coins: 0, best: 0, levels: {}, updated: 0 }),
  // Cross-device merge: best stars per level, max coins / best distance.
  mergeProgress: (a, b) => {
    const levels = { ...a.levels };
    for (const [gi, lv] of Object.entries(b.levels || {})) {
      if (!levels[gi] || (lv.stars || 0) > (levels[gi].stars || 0)) levels[gi] = lv;
    }
    return {
      coins: Math.max(a.coins || 0, b.coins || 0),
      best: Math.max(a.best || 0, b.best || 0),
      levels,
    };
  },
});
const levelsDone = (prog) => Object.keys(prog.levels).length;
const unlockedLevel = (prog) => { let m = -1; for (const k of Object.keys(prog.levels)) m = Math.max(m, +k); return m + 1; };

/* ------------------------------------------------------------------- Sfx  */
// gamekit synth core (tone/noise/click/coin/win/lose/wrong) + game jingles.
const Sfx = GK.Sfx;
Object.assign(Sfx, {
  hop()    { this.tone({ freq: 520, type:"triangle", dur:0.09, vol:0.16, slide:180 }); },
  squash() { this.noise({ dur:0.18, vol:0.35 }); this.tone({ freq:150, type:"sawtooth", dur:0.25, vol:0.2, slide:-90 }); },
  splash() { this.noise({ dur:0.35, vol:0.28 }); this.tone({ freq:400, type:"sine", dur:0.3, vol:0.15, slide:-260 }); },
  bell()   { this.tone({ freq: 1100, type:"square", dur:0.12, vol:0.13 });
             this.tone({ freq: 1100, type:"square", dur:0.12, vol:0.13, when:0.18 }); },
  thud()   { this.tone({ freq: 130, type:"sine", dur:0.11, vol:0.13, slide:-45 });
             this.noise({ dur:0.06, vol:0.07 }); },
  horn()   { this.tone({ freq: 240, type:"sawtooth", dur:0.5, vol:0.22 });
             this.tone({ freq: 180, type:"sawtooth", dur:0.5, vol:0.18 });
             this.noise({ dur:0.6, vol:0.12, when:0.05 }); },
});

/* ----------------------------------------------------------------- Levels */
// Worlds -> levels. Each level = target distance + difficulty params + theme.
const WORLDS = [
  { name:"Sunny Meadows", emoji:"🌻", accent:"#c8f0a0",
    theme:{ grassA:"#7ac74f", grassB:"#72bd47", road:"#4b4b55", water:"#3f9be0", bg:"#6bbf4a" },
    w:{ grass:0.55, road:0.35, water:0.10, rail:0.0 } },
  { name:"Busy City", emoji:"🏙️", accent:"#cfd6dd",
    theme:{ grassA:"#8ad39a", grassB:"#7ec98d", road:"#42424c", water:"#3f9be0", bg:"#5a6b60" },
    w:{ grass:0.35, road:0.48, water:0.05, rail:0.12 } },
  { name:"Rushing River", emoji:"🌊", accent:"#a9dcf5",
    theme:{ grassA:"#6fc24d", grassB:"#66b845", road:"#4b4b55", water:"#2f8fd8", bg:"#3f9be0" },
    w:{ grass:0.30, road:0.22, water:0.43, rail:0.05 } },
  { name:"Frozen Tracks", emoji:"❄️", accent:"#dff1fb",
    theme:{ grassA:"#cfe8ef", grassB:"#c3e0e9", road:"#6d7a83", water:"#7fc3e8", bg:"#bfe3f0" },
    w:{ grass:0.30, road:0.28, water:0.10, rail:0.32 } },
  { name:"Rush Hour", emoji:"🚦", accent:"#f4c8a0",
    theme:{ grassA:"#5f8f4a", grassB:"#578442", road:"#38383f", water:"#2f6fa8", bg:"#3a4a3a" },
    w:{ grass:0.25, road:0.42, water:0.18, rail:0.15 } },
  { name:"Night Roads", emoji:"🌙", accent:"#9fb4d8",
    theme:{ grassA:"#3f6b3a", grassB:"#396234", road:"#2b2b33", water:"#1f5e8e", bg:"#2e4030" },
    w:{ grass:0.30, road:0.45, water:0.10, rail:0.15 } },
  { name:"Desert Dash", emoji:"🏜️", accent:"#f0dca0",
    theme:{ grassA:"#d9b866", grassB:"#d2b05e", road:"#5a4f46", water:"#3f9be0", bg:"#cfae5e" },
    w:{ grass:0.38, road:0.40, water:0.07, rail:0.15 } },
  { name:"Jungle Rapids", emoji:"🌴", accent:"#b3e6a0",
    theme:{ grassA:"#4e9e44", grassB:"#46943c", road:"#454f43", water:"#2a7fc4", bg:"#3e8a38" },
    w:{ grass:0.28, road:0.18, water:0.46, rail:0.08 } },
  { name:"Grand Central", emoji:"🚂", accent:"#d8c4b0",
    theme:{ grassA:"#8fae7a", grassB:"#86a471", road:"#3e3e46", water:"#3f89c8", bg:"#6e8560" },
    w:{ grass:0.30, road:0.25, water:0.05, rail:0.40 } },
  { name:"Volcano Finale", emoji:"🌋", accent:"#f4a888",
    theme:{ grassA:"#6e5a50", grassB:"#665349", road:"#33272a", water:"#d84315", bg:"#4a3733" },
    w:{ grass:0.22, road:0.38, water:0.20, rail:0.20 } },
];
const LEVELS_PER_WORLD = 4;
const LEVELS = [];
WORLDS.forEach((world, wi) => {
  for (let j=0; j<LEVELS_PER_WORLD; j++) {
    const gi = LEVELS.length;
    const diff = wi*LEVELS_PER_WORLD + j;         // 0..39
    LEVELS.push({
      gi, world, wi, indexInWorld: j,
      // Rows to reach. Worlds 1-5 keep their original targets (saved progress
      // and star records stay valid); later levels grow more gently so the
      // finale is long but not a marathon.
      target: gi < 20 ? 12 + gi*3 : 66 + Math.round((gi-20)*1.5),
      // Every ramp below caps out around diff 21 (the start of world 6), so the
      // caps -- not the slopes -- are what worlds 6-10 actually play at. They
      // are set to the fastest values that still leave a lane readable: a hop
      // takes HOP_TIME, so a car much past ~5 tiles/sec crosses a tile faster
      // than the player can commit to a move.
      params: {
        weights: world.w,
        theme: world.theme,
        carMin: Math.min(1.5 + diff*0.10, 3.0),
        carMax: Math.min(3.0 + diff*0.16, 5.2),
        truckChance: 0.22 + Math.min(0.12, diff*0.01),
        creep: Math.min(0.45 + diff*0.035, 0.95),
        coinRate: 0.42,
        railFast: Math.min(12 + diff*0.4, 19),
      },
    });
  }
});

/* ------------------------------------------------------------------- Game */
const COLS = 9;
const CONFETTI_COLORS = ["#ffd93b","#e8403a","#4fc3f7","#7ac74f","#ff9f43","#c77dff"];
const HOP_TIME = 0.11;
const REVIVE_COST = 50;

const Game = {
  canvas: null, ctx: null, W:0, H:0, TILE:60, DPR:1,
  BASE_Y: 0.64,
  active:false, running:false,
  profile:null, progress:null,
  level:null, mode:"level", target:0, params:null, theme:null,
  world:null, maxGen:-1, roadStreak:0, waterStreak:0,
  chick:null, camRow:0, camForced:0, shake:0, elapsed:0,
  runCoins:0, invince:0, revived:false, dead:false, result:null,
  inputQueue:null, paused:false,
  bumpT:0, bumpX:0, bumpY:0,

  boot() {
    this.canvas = document.getElementById("c");
    this.ctx = this.canvas.getContext("2d");
    this.resize();
    window.addEventListener("resize", () => this.resize());
    // Auto-pause when the tab is hidden / the tablet locks, so an interrupted
    // run isn't lost. The player resumes from the overlay when they're back.
    document.addEventListener("visibilitychange", () => { if (document.hidden) this.pause(); });
    this.bindInput();
    requestAnimationFrame((t)=>this.loop(t));
  },

  resize() {
    this.DPR = Math.min(window.devicePixelRatio||1, 2);
    const w = window.innerWidth, h = window.innerHeight;
    // A hidden/background tab can report 0x0 at boot; retry until real
    // dimensions arrive so world geometry never goes NaN.
    if (!w || !h) { setTimeout(() => this.resize(), 200); return; }
    this.canvas.style.width = w+"px"; this.canvas.style.height = h+"px";
    this.canvas.width = Math.round(w*this.DPR); this.canvas.height = Math.round(h*this.DPR);
    this.ctx.setTransform(this.DPR,0,0,this.DPR,0,0);
    this.W=w; this.H=h;
    // Playfield is COLS tiles wide, centred; on wide screens (iPad landscape,
    // desktop) the world art extends past it, Crossy-Road style.
    this.TILE = Math.min(w/COLS, h/11);
    this.X0 = (w - COLS*this.TILE)/2;
    this.extC = this.X0/this.TILE + 1.2; // tiles of travel beyond the playfield
  },

  /* ----- start a game ----- */
  begin(cfg) {
    this.profile = App.profile;
    this.progress = Storage.getProgress(this.profile.id);
    this.mode = cfg.mode; this.level = cfg.level||null;
    this.target = cfg.target||0; this.params = cfg.params; this.theme = cfg.params.theme;
    this.canvas.style.background = this.theme.bg;

    this.world = {}; this.maxGen=-1; this.roadStreak=0; this.waterStreak=0;
    this.ensureRows(45);
    this.chick = { col:4, row:0, fromCol:4, fromRow:0, toCol:4, toRow:0, hop:1, maxRow:0,
                   rideLog:null, rideOff:0 };
    this.camRow=0; this.camForced=0; this.shake=0; this.elapsed=0;
    this.runCoins=0; this.invince=0; this.revived=false; this.dead=false; this.result=null;
    this.inputQueue=null; this.paused=false; this.bumpT=0; GK.Fx.reset();
    this.running=true; this.active=true;
    App.closeModal("result-modal");
    App.showScreen("game");
    this.updateHud();
  },

  /* ----- lane generation ----- */
  makeLane(row) {
    if (row <= 3) return { type:"grass", trees:new Set(), coin:null };
    const w = this.params.weights;
    let type;
    const r = Math.random();
    if (this.roadStreak >= 3) type = r<0.5 ? "grass" : (w.water>0?"water":"grass");
    else {
      // weighted pick
      const roll = Math.random();
      let acc=0; type="grass";
      for (const t of ["grass","road","water","rail"]) { acc += w[t]||0; if (roll<=acc){ type=t; break; } }
    }
    this.roadStreak = type==="road" ? this.roadStreak+1 : 0;
    this.waterStreak = type==="water" ? this.waterStreak+1 : 0;

    let lane;
    if (type==="grass") {
      const trees = new Set(); const n = irand(0,3); let guard=0;
      while (trees.size<n && guard++<20) trees.add(irand(0,COLS-1));
      if (trees.size>=COLS) trees.delete(irand(0,COLS-1));
      this.openPaths(trees, this.world[row-1]);
      lane = { type:"grass", trees, coin:null };
    } else if (type==="road") {
      const dir = Math.random()<0.5?-1:1;
      const speed = rand(this.params.carMin, this.params.carMax);
      const kind = Math.random()<this.params.truckChance ? "truck":"car";
      const width = kind==="truck"?2.0:1.0;
      const color = pick(CAR_COLORS);
      // Vehicles loop over the full visible width so nothing pops in mid-screen.
      const ext = this.extC, loop = COLS + 2*ext;
      // Spacing is centre-to-centre, so a 2-tile truck ate its extra width out
      // of the gap the player crosses -- truck lanes were tighter than car
      // lanes with nothing to signal it. Add the width back so the actual
      // opening is the same whatever is driving down it.
      const count = Math.max(2, Math.round(loop / (rand(4.2,5.4) + width-1)));
      const gap = loop/count, off = rand(0,gap);
      const cars = [];
      for (let i=0;i<count;i++) cars.push({ x:i*gap+off-ext, width, kind });
      lane = { type:"road", dir, speed, color, cars, ext, loop, coin:null };
    } else if (type==="water") {
      const dir = Math.random()<0.5?-1:1;
      const speed = rand(0.9,1.9);
      const ext = this.extC, loop = COLS + 2*ext;
      const count = Math.max(2, Math.round(loop / rand(3.6,4.8)));
      const gap = loop/count, off = rand(0,gap);
      const logs = [];
      for (let i=0;i<count;i++) logs.push({ x:i*gap+off-ext, len:irand(2,3) });
      lane = { type:"water", dir, speed, logs, ext, loop };
    } else { // rail
      const dir = Math.random()<0.5?-1:1;
      lane = { type:"rail", dir, phase:"clear", timer:rand(2.5,5.5),
               gate:0, blink:0, train:{x:0}, warned:false, coin:null };
    }
    // coins on grass / road
    if ((lane.type==="grass"||lane.type==="road") && Math.random()<this.params.coinRate) {
      let col = irand(0,COLS-1), guard=0;
      while (lane.type==="grass" && lane.trees.has(col) && guard++<10) col = irand(0,COLS-1);
      if (!(lane.type==="grass" && lane.trees.has(col))) lane.coin = { col, taken:false, bob:Math.random()*6 };
    }
    return lane;
  },
  // Trees were placed at random per lane, so two grass rows could conspire to
  // wall the chick in: trees either side of it on its own row, and a tree
  // directly ahead. It can't step sideways, can't go forward, and the camera
  // takes it -- a death the player couldn't have avoided. Walk the previous
  // lane's pockets (runs of treeless columns the chick could be standing in)
  // and make sure each one has at least one open column directly above it.
  // Applied to every lane as it is generated, this keeps the whole world
  // connected without making the trees look any more regular.
  openPaths(trees, prev) {
    const blocked = (prev && prev.type==="grass") ? prev.trees : new Set();
    let start = 0;
    for (let col=0; col<=COLS; col++) {
      if (col<COLS && !blocked.has(col)) continue; // still inside a pocket
      if (col>start) {                             // pocket spans [start, col-1]
        let open = false;
        for (let c=start; c<col; c++) if (!trees.has(c)) { open = true; break; }
        if (!open) trees.delete(irand(start, col-1));
      }
      start = col+1;
    }
  },
  ensureRows(upTo) { while (this.maxGen<upTo){ this.maxGen++; this.world[this.maxGen]=this.makeLane(this.maxGen); } },

  /* ----- input ----- */
  bindInput() {
    const km = { ArrowUp:[0,1],KeyW:[0,1],ArrowDown:[0,-1],KeyS:[0,-1],
                 ArrowLeft:[-1,0],KeyA:[-1,0],ArrowRight:[1,0],KeyD:[1,0] };
    window.addEventListener("keydown", e => {
      if (App.screen!=="game") return;
      if (e.code==="Escape" || e.code==="KeyP"){ e.preventDefault(); if (!this.dead) this.togglePause(); return; }
      if (!this.running || this.paused) return;
      if (e.code==="Space"){ e.preventDefault(); this.move(0,1); return; }
      const m = km[e.code]; if (m){ e.preventDefault(); this.move(m[0],m[1]); }
    });
    // Crossy-Road-style touch: tap = hop forward; a swipe fires the moment the
    // finger crosses the threshold (during the gesture, not on release).
    const SWIPE = 18; // px
    let tp = null;    // { id, x, y, t, fired }
    const start = (id,x,y) => { Sfx.init(); if (tp) return; tp = { id, x, y, t: performance.now(), fired:false }; };
    const drag = (id,x,y) => {
      if (!tp || tp.id !== id || tp.fired) return;
      const dx = x - tp.x, dy = y - tp.y;
      if (Math.hypot(dx,dy) < SWIPE) return;
      tp.fired = true;
      if (App.screen !== "game" || !this.running) return;
      if (Math.abs(dx) > Math.abs(dy)) this.move(dx>0?1:-1, 0);
      else this.move(0, dy<0?1:-1);
    };
    const end = (id) => {
      if (!tp || tp.id !== id) return;
      const fired = tp.fired, dt = performance.now() - tp.t;
      tp = null;
      if (fired) return;
      if (App.screen === "game" && this.running && dt < 400) this.move(0,1); // tap
    };
    const cancel = (id) => { if (tp && tp.id === id) tp = null; };
    this.canvas.addEventListener("touchstart", e=>{ e.preventDefault(); const t=e.changedTouches[0]; start(t.identifier,t.clientX,t.clientY); }, { passive:false });
    this.canvas.addEventListener("touchmove",  e=>{ e.preventDefault(); for (const t of e.changedTouches) drag(t.identifier,t.clientX,t.clientY); }, { passive:false });
    this.canvas.addEventListener("touchend",   e=>{ e.preventDefault(); for (const t of e.changedTouches) end(t.identifier); }, { passive:false });
    this.canvas.addEventListener("touchcancel",e=>{ for (const t of e.changedTouches) cancel(t.identifier); });
    // mouse fallback for desktop
    this.canvas.addEventListener("mousedown", e=>start("m",e.clientX,e.clientY));
    window.addEventListener("mousemove", e=>drag("m",e.clientX,e.clientY));
    window.addEventListener("mouseup",   ()=>end("m"));
    // block iOS pinch-zoom gestures
    document.addEventListener("gesturestart", e=>e.preventDefault());
  },

  move(dc,dr) {
    if (!this.running || this.dead || this.paused) return;
    if (this.chick.hop<1){ this.inputQueue=[dc,dr]; return; }
    this.doMove(dc,dr);
  },
  camBottomRow(){ return Math.floor(this.camForced - (this.H*(1-this.BASE_Y))/this.TILE)+1; },
  doMove(dc,dr) {
    let tr = this.chick.row+dr;
    if (tr<0) tr=0;
    tr = Math.max(tr, this.camBottomRow());
    // Shuffling along a log moves one tile from where the bird actually is, not
    // from the nearest grid column. Rounding to the grid each hop threw away the
    // fractional offset the current had given it, cancelling part of the carry
    // and walking it off the back of the log. Landings on dry ground still snap
    // to a column, so the grid is intact everywhere it matters.
    const from = this.world[this.chick.row], dest = this.world[tr];
    const afloat = from && from.type==="water" && dest && dest.type==="water";
    const base = afloat ? this.chick.col : Math.round(this.chick.col);
    let tc = clamp(base+dc, 0, COLS-1);
    // The move went nowhere -- the playfield edge or the camera floor refused
    // it. The world art carries on past column 0/8, so an edge swipe used to
    // land in silence and read as a dropped input; answer it instead.
    if (tc===base && tr===this.chick.row) { this.bump(dc,dr); return; }
    if (dest && dest.type==="grass" && dest.trees.has(tc)) { this.bump(dc,dr); return; } // blocked
    const c=this.chick;
    c.fromCol=c.col; c.fromRow=c.row; c.toCol=tc; c.toRow=tr; c.hop=0;
    c.rideLog=null;   // re-take the offset on landing, wherever that turns out to be
    Sfx.hop();
  },

  // Refused input: lean the chick a fraction of a tile the way it tried to go
  // and spring back, so "you can't go there" is visible as well as audible.
  bump(dc,dr) {
    if (this.bumpT>0.55) return; // still leaning from the last one
    this.bumpT=1; this.bumpX=dc||0; this.bumpY=dr||0;
    Sfx.thud();
  },

  /* ----- pause ----- */
  pause() {
    if (!this.active || !this.running || this.dead || this.paused) return;
    this.paused = true;
    App.openModal("pause-modal");
  },
  resume() {
    if (!this.paused) return;
    this.paused = false;
    this._last = performance.now(); // avoid a dt jump after the freeze
    App.closeModal("pause-modal");
  },
  togglePause() { if (this.paused) this.resume(); else this.pause(); },

  /* ----- main loop ----- */
  loop(now) {
    let dt = (now-(this._last||now))/1000; this._last=now;
    if (dt>0.05) dt=0.05;
    // paused: keep rendering the frozen frame (behind the overlay), don't advance
    if (this.active) { if (!this.paused) this.update(dt); this.render(); }
    else this.ctx.clearRect(0,0,this.W,this.H);
    requestAnimationFrame(t=>this.loop(t));
  },

  update(dt) {
    this.elapsed+=dt;
    if (this.shake>0) this.shake=Math.max(0,this.shake-dt*2.2);
    if (this.bumpT>0) this.bumpT=Math.max(0,this.bumpT-dt*6);
    if (this.invince>0) this.invince-=dt;
    // Above the !running gate on purpose: winning stops the run, and the
    // confetti has to keep falling behind the result card.
    GK.Fx.update(dt);

    // animate hazards near camera even if paused? only when running
    this.animateHazards(dt, this.camRow);

    if (!this.running) return;

    // Camera creep. The distance bonus tops out early on purpose: letting it
    // run to row 200 meant the camera accelerated hardest exactly when a run
    // had the most to lose, which read as a difficulty wall rather than a ramp.
    const creep = this.params.creep + Math.min(this.chick.maxRow,90)*0.004;
    this.camForced += creep*dt;

    const c = this.chick;
    if (c.hop<1) {
      // A hop launched from a log has to travel with it. Carrying the rider
      // only once it had landed meant the log slid out from under it during
      // the 110ms flight -- about 0.2 of a tile at full current, so a few
      // nudges along a log walked the bird off the back through no fault of
      // its own. Translate the whole arc by the lane's drift instead. Hops
      // onto dry land keep their target, so they still land squarely on it.
      const src = this.world[c.fromRow], dst = this.world[c.toRow];
      if (!this.dead && src && src.type==="water" && dst && dst.type==="water") {
        const drift = src.dir*src.speed*dt;
        c.fromCol += drift; c.toCol += drift;
      }
      c.hop = Math.min(1, c.hop + dt/HOP_TIME);
      c.col = lerp(c.fromCol,c.toCol,c.hop); c.row = lerp(c.fromRow,c.toRow,c.hop);
      if (c.hop>=1) {
        c.col=c.toCol; c.row=c.toRow;
        if (c.row>c.maxRow){ c.maxRow=c.row; this.updateHud(); this.checkWin(); }
        if (this.inputQueue){ const q=this.inputQueue; this.inputQueue=null; this.doMove(q[0],q[1]); }
      }
    }

    this.ensureRows(Math.ceil(this.camForced)+50);
    this.camRow = lerp(this.camRow, Math.max(c.row,this.camForced), 1-Math.pow(0.0001,dt));

    if (c.hop>=1 && !this.dead) this.laneEffects(dt);

    // fell behind camera
    if (!this.dead && c.row < this.camRow - (this.H*this.BASE_Y)/this.TILE - 0.5)
      this.die("fell");
  },

  animateHazards(dt, center) {
    const lo=Math.floor(center-16), hi=Math.ceil(center+22);
    for (let r=lo;r<=hi;r++){
      const lane=this.world[r]; if(!lane) continue;
      if (lane.type==="road") {
        const M=lane.ext??1.2, L=lane.loop??(COLS+2.4);
        for (const car of lane.cars){ car.x += lane.dir*lane.speed*dt;
          if (lane.dir>0 && car.x>COLS+M) car.x-=L;
          else if (lane.dir<0 && car.x<-M) car.x+=L; }
      } else if (lane.type==="water") {
        const M=lane.ext??1.2, L=lane.loop??(COLS+2.4);
        for (const lg of lane.logs){ lg.x += lane.dir*lane.speed*dt;
          const span=L+lg.len;
          if (lane.dir>0 && lg.x-lg.len/2>COLS+M) lg.x-=span;
          else if (lane.dir<0 && lg.x+lg.len/2<-M) lg.x+=span; }
      } else if (lane.type==="rail") {
        this.updateRail(lane, dt, r, center);
      }
    }
  },

  updateRail(lane, dt, row, center) {
    const visible = this.running && Math.abs(row-center)<13;
    lane.blink += dt;
    if (lane.phase==="clear") {
      lane.gate = Math.max(0, lane.gate - dt*4);
      lane.timer -= dt;
      if (lane.timer<=0){ lane.phase="warn"; lane.timer=1.4; lane.warned=false; }
    } else if (lane.phase==="warn") {
      lane.gate = Math.min(1, lane.gate + dt*3);
      lane.timer -= dt;
      if (visible && !lane.warned){ Sfx.bell(); lane.warned=true; }
      if (lane.timer<=0){ lane.phase="train";
        const edge = this.extC + 7; // fully beyond the visible edge (train is 6 tiles)
        lane.train.x = lane.dir>0 ? -edge : COLS+edge;
        if (visible) Sfx.horn(); }
    } else { // train
      lane.gate = 1;
      lane.train.x += lane.dir*this.params.railFast*dt;
      const edge = this.extC + 7;
      const done = lane.dir>0 ? lane.train.x>COLS+edge : lane.train.x<-edge;
      if (done){ lane.phase="clear"; lane.timer=rand(3,6.5); }
    }
  },

  laneEffects(dt) {
    const c=this.chick, lane=this.world[c.row];
    if (!lane) return;
    // coin pickup
    if (lane.coin && !lane.coin.taken && Math.round(c.col)===lane.coin.col) {
      lane.coin.taken=true; this.runCoins++; this.progress.coins++;
      Storage.saveProgress(this.profile.id, this.progress); Sfx.coin(); this.updateHud();
    }
    // Riding happens even while invincible -- a bird that stood still on a
    // moving log until the invincibility ran out would be dumped in open water.
    if (lane.type==="water") {
      const riding = this.rideLog(lane);
      if (this.invince>0) return;
      if (!riding) { this.die("water"); return; }
      if (c.col<-0.35 || c.col>COLS-0.65) this.die("fell");
      return;
    }
    if (this.invince>0) return;
    if (lane.type==="road") {
      // Hitbox matches the rendered sprites: car body half-width is car.width*0.45
      // (drawn at car.width*T*0.9) and the chick body half-width is ~0.2 tiles, so
      // sprites touch at car.width*0.45+0.2. Small -0.02 keeps deaths from firing on
      // a still-visible gap (old car.width/2+0.42 left a ~0.27-tile gap = unfair).
      for (const car of lane.cars){ if (Math.abs(car.x-c.col) < car.width*0.45+0.18){ this.die("car"); return; } }
    } else if (lane.type==="rail") {
      // Train sprite is 6 tiles wide (half-width 3); firing at <3 means the chick's
      // centre is already under the body (near edge overlapping) — fair, so unchanged.
      if (lane.phase==="train" && Math.abs(lane.train.x - c.col) < 3) this.die("train");
    }
  },

  // Lock the rider to the log it boarded, by a fixed offset from the log's
  // centre, rather than re-integrating the current every frame. The logs have
  // already moved by the time this runs, so integrating left the bird a frame
  // behind the timber it was standing on and biased it toward the trailing
  // edge. Returns false when it is in open water. The on-log test matches the
  // drawn log (len*0.94 wide) plus a toe's worth of overhang, so "it looks
  // like I'm on it" and "I'm on it" agree.
  rideLog(lane) {
    const c=this.chick;
    const log = lane.logs.find(lg => Math.abs(c.col-lg.x) < lg.len*0.47+0.12);
    if (!log){ c.rideLog=null; return false; }
    if (c.rideLog!==log){ c.rideLog=log; c.rideOff=c.col-log.x; }
    const next = log.x + c.rideOff;
    // the log looped round to the far bank without its passenger
    if (Math.abs(next-c.col) > 0.5){ c.rideLog=null; return false; }
    c.col = next;
    return true;
  },

  checkWin() {
    if (this.mode==="level" && !this.dead && this.chick.maxRow >= this.target) this.win();
  },

  win() {
    this.running=false;
    if (this.chick.maxRow>this.progress.best){ this.progress.best=this.chick.maxRow; }
    // stars: complete=1, +1 if >=5 coins this run, +1 if >=10
    let stars=1; if (this.runCoins>=5) stars++; if (this.runCoins>=10) stars++;
    const gi=this.level.gi, prev=this.progress.levels[gi];
    if (!prev || stars>prev.stars) this.progress.levels[gi]={ stars, coins:this.runCoins };
    else this.progress.levels[gi]=prev;
    Storage.saveProgress(this.profile.id, this.progress);
    Sfx.win();
    // Win juice: a confetti shower over the finish, from the kit's shared pool.
    GK.Fx.confetti(this.W, this.H, CONFETTI_COLORS, 90);
    this.result={ type:"win", stars, coins:this.runCoins };
    setTimeout(()=>App.showResult(this.result), 500);
  },

  die(reason) {
    if (this.dead) return;
    this.dead=true; this.running=false; this.shake=1;
    this.deathReason=reason;
    if (reason==="water"||reason==="fell") Sfx.splash(); else Sfx.squash();
    Sfx.lose();
    if (this.chick.maxRow>this.progress.best){ this.progress.best=this.chick.maxRow;
      Storage.saveProgress(this.profile.id, this.progress); }
    this.result={ type:"lose", reason, dist:this.chick.maxRow, coins:this.runCoins };
    setTimeout(()=>App.showResult(this.result), 650);
  },

  revive() {
    if (this.progress.coins < REVIVE_COST) return false;
    this.progress.coins -= REVIVE_COST;
    Storage.saveProgress(this.profile.id, this.progress);
    const c=this.chick;
    const sr = this.safeRow(Math.floor(c.row));
    c.row=sr; c.maxRow=Math.max(c.maxRow,sr);
    c.col=this.safeCol(sr, clamp(Math.round(c.col),0,COLS-1));
    c.hop=1; c.fromRow=c.toRow=sr; c.fromCol=c.toCol=c.col; c.rideLog=null;
    this.bumpT=0;
    this.dead=false; this.running=true; this.invince=2.2; this.revived=true;
    App.closeModal("result-modal"); this.updateHud();
    return true;
  },

  // Revive costs 50 coins, so it must never hand back a doomed run -- the old
  // six-row search gave up silently and left the chick standing in the water
  // lane that had just drowned it. Prefer ground below the death row (losing a
  // little distance is fairer than gaining it), then look ahead, and if this
  // stretch of world is all hazard, turn the landing row into grass outright.
  safeRow(from) {
    const floor = Math.max(0, this.camBottomRow()+1); // below this the camera takes you
    for (let r=Math.max(from,floor); r>=floor; r--) if (this.isSafeRow(r)) return r;
    for (let r=from+1; r<=from+10; r++){ this.ensureRows(r); if (this.isSafeRow(r)) return r; }
    const r = Math.max(from, floor);
    this.world[r] = { type:"grass", trees:new Set(), coin:null };
    return r;
  },
  isSafeRow(r){ const lane=this.world[r]; return !!lane && lane.type==="grass"; },
  // ...and never inside a tree, where the first hop out would be refused.
  safeCol(row, want) {
    const lane=this.world[row];
    if (!lane || lane.type!=="grass" || !lane.trees.has(want)) return want;
    for (let d=1; d<COLS; d++) for (const col of [want-d, want+d])
      if (col>=0 && col<COLS && !lane.trees.has(col)) return col;
    return want;
  },

  exitToMap() {
    this.running=false; this.active=false; this.paused=false;
    App.closeModal("result-modal");
    App.closeModal("pause-modal");
    App.showMap();
  },

  updateHud() {
    const prog = document.getElementById("g-progress");
    if (this.mode==="level") prog.textContent = `${this.chick.maxRow} / ${this.target}`;
    else prog.textContent = `${this.chick.maxRow} m`;
    document.getElementById("g-coins").textContent = "🪙 " + (this.progress ? this.progress.coins : 0);
  },

  /* ----- render ----- */
  screen(col,row){ const x=this.X0+(col+0.5)*this.TILE, y=this.H*this.BASE_Y-(row-this.camRow)*this.TILE; return [x,y]; },

  render() {
    const ctx=this.ctx, TILE=this.TILE;
    ctx.save();
    if (this.shake>0){ const s=this.shake*10; ctx.translate((Math.random()-0.5)*s,(Math.random()-0.5)*s); }
    ctx.clearRect(-20,-20,this.W+40,this.H+40);
    ctx.fillStyle=this.theme.bg; ctx.fillRect(-20,-20,this.W+40,this.H+40);

    const lo=Math.floor(this.camRow-(this.H*this.BASE_Y)/TILE)-2;
    const hi=Math.ceil(this.camRow+(this.H*(1-this.BASE_Y))/TILE)+2;
    for (let r=hi;r>=lo;r--){ if (r>this.maxGen) this.ensureRows(r);
      this.drawLane(r, this.world[r]); }
    this.drawChick();
    // darken the world beyond the playfield edges (Crossy-Road style)
    if (this.X0 > 2) {
      const g1=ctx.createLinearGradient(0,0,this.X0,0);
      g1.addColorStop(0,"rgba(0,0,0,0.35)"); g1.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=g1; ctx.fillRect(0,-20,this.X0,this.H+40);
      const g2=ctx.createLinearGradient(this.W,0,this.W-this.X0,0);
      g2.addColorStop(0,"rgba(0,0,0,0.35)"); g2.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=g2; ctx.fillRect(this.W-this.X0,-20,this.X0,this.H+40);
    }
    ctx.restore();
    // Win confetti sits in screen space, outside the shake transform, so the
    // celebration doesn't judder along with the world.
    GK.Fx.render(ctx);
  },

  drawLane(row, lane) {
    const ctx=this.ctx, TILE=this.TILE, th=this.theme;
    const [,cy]=this.screen(0,row), top=cy-TILE/2;
    if (row<0 || !lane){ ctx.fillStyle="#2a6db0"; ctx.fillRect(0,top,this.W,TILE+1); return; }

    if (lane.type==="grass") {
      ctx.fillStyle = (row%2===0)?th.grassA:th.grassB; ctx.fillRect(0,top,this.W,TILE+1);
      ctx.fillStyle="rgba(255,255,255,0.04)"; ctx.fillRect(0,top,this.W,3);
      // dense decorative forest beyond the playfield (wide screens)
      const ext = Math.ceil(this.X0/TILE);
      for (let i=1;i<=ext;i++) for (const col of [-i, COLS-1+i]) {
        const h = hash2(row,col);
        if (h < 0.55) { const [x,y]=this.screen(col,row); this.drawTree(x,y,h<0.12); }
      }
      for (const col of lane.trees){ const [x,y]=this.screen(col,row); this.drawTree(x,y,(col*7+row)%3===0); }
    } else if (lane.type==="road") {
      ctx.fillStyle=th.road; ctx.fillRect(0,top,this.W,TILE+1);
      ctx.fillStyle="rgba(255,255,255,0.5)"; const dy=top+TILE/2-2;
      for (let x=0;x<this.W;x+=TILE) ctx.fillRect(x+TILE*0.25,dy,TILE*0.4,4);
      ctx.fillStyle="rgba(0,0,0,0.18)"; ctx.fillRect(0,top,this.W,4);
      for (const car of lane.cars) this.drawCar(car,lane,row);
    } else if (lane.type==="water") {
      this.drawWater(lane,row,top);
      for (const lg of lane.logs) this.drawLog(lg,row,lane);
    } else if (lane.type==="rail") {
      this.drawRail(lane,row,top);
    }
    if (lane.coin && !lane.coin.taken) this.drawCoin(lane.coin, row);
  },

  drawTree(x,y,rock) {
    const ctx=this.ctx, T=this.TILE;
    ctx.fillStyle="rgba(0,0,0,0.15)"; ctx.beginPath(); ctx.ellipse(x,y+T*0.3,T*0.3,T*0.13,0,0,7); ctx.fill();
    if (rock){ ctx.fillStyle="#9aa1a8"; rr(ctx,x-T*0.26,y-T*0.18,T*0.52,T*0.5,8); ctx.fill();
      ctx.fillStyle="#b5bcc2"; rr(ctx,x-T*0.2,y-T*0.22,T*0.3,T*0.22,6); ctx.fill(); return; }
    ctx.fillStyle="#7a4a1e"; ctx.fillRect(x-T*0.07,y-T*0.05,T*0.14,T*0.35);
    ctx.fillStyle="#3f8f3a"; rr(ctx,x-T*0.3,y-T*0.6,T*0.6,T*0.62,12); ctx.fill();
    ctx.fillStyle="#4aa544"; rr(ctx,x-T*0.24,y-T*0.66,T*0.4,T*0.4,10); ctx.fill();
  },
  drawCar(car,lane,row) {
    const ctx=this.ctx, T=this.TILE, [x,y]=this.screen(car.x,row);
    const w=car.width*T*0.9, h=T*0.62;
    ctx.fillStyle="rgba(0,0,0,0.22)"; rr(ctx,x-w/2+4,y-h/2+6,w,h,10); ctx.fill();
    ctx.fillStyle=lane.color; rr(ctx,x-w/2,y-h/2,w,h,10); ctx.fill();
    ctx.fillStyle="rgba(255,255,255,0.22)";
    const cw=car.kind==="truck"?w*0.35:w*0.5, cx=lane.dir>=0?x-w/2+w*0.08:x+w/2-w*0.08-cw;
    rr(ctx,cx,y-h/2+5,cw,h*0.45,6); ctx.fill();
    ctx.fillStyle="rgba(120,190,240,0.85)"; rr(ctx,cx+3,y-h/2+8,cw-6,h*0.3,4); ctx.fill();
    ctx.fillStyle="#fff4c2"; const lx=lane.dir>=0?x+w/2-5:x-w/2+1;
    ctx.fillRect(lx,y-h*0.28,4,5); ctx.fillRect(lx,y+h*0.18,4,5);
  },
  // Whole water lanes bob in phase so logs and their rider move as one unit.
  waterBob(row) { return Math.sin(this.elapsed*2.2 + row*1.7) * this.TILE*0.03; },

  drawWater(lane,row,top) {
    const ctx=this.ctx, T=this.TILE, W=this.W, t=this.elapsed;
    ctx.fillStyle=(row%2===0)?this.theme.water:shade(this.theme.water,-8);
    ctx.fillRect(0,top,W,T+1);
    // depth: darker along the top bank, lighter in the shallows below
    ctx.fillStyle="rgba(0,0,20,0.10)"; ctx.fillRect(0,top,W,T*0.18);
    ctx.fillStyle="rgba(255,255,255,0.05)"; ctx.fillRect(0,top+T*0.8,W,T*0.2);
    // two ribbons of drifting sine shimmer, moving with the current
    const flow = lane.dir*lane.speed*T;             // current, px/sec
    ctx.fillStyle="rgba(255,255,255,0.10)";
    for (let b=0;b<2;b++){
      const yb = top + T*(b?0.62:0.32);
      const ph = t*(b?1.7:1.1) + row*2.1 + b*3;
      const span = T*1.4;
      const drift = ((t*flow*(b?0.35:0.55))%span+span)%span;
      for (let x=-span;x<W+span;x+=T*0.7){
        const xx = x + drift;
        const yy = yb + Math.sin(xx*0.045 + ph)*T*0.06;
        rr(ctx, xx, yy, T*0.34, Math.max(2,T*0.035), 2); ctx.fill();
      }
    }
    // twinkling sparkle glints, deterministic per row, drifting downstream
    ctx.fillStyle="rgba(255,255,255,0.22)";
    const n = Math.ceil(W/T);
    for (let i=0;i<n;i++){
      const gx = ((hash2(row,i)*W + t*flow*0.45)%W + W)%W;
      const gy = top + T*(0.2 + hash2(i,row)*0.6);
      const tw = 0.5 + 0.5*Math.sin(t*3 + i*2.4 + row);
      if (tw > 0.4){ ctx.beginPath(); ctx.ellipse(gx,gy,T*0.05*tw+1,Math.max(1.2,T*0.02),0,0,7); ctx.fill(); }
    }
  },

  drawLog(lg,row,lane) {
    const ctx=this.ctx, T=this.TILE;
    let [x,y]=this.screen(lg.x,row);
    y += this.waterBob(row);
    const w=lg.len*T*0.94, h=T*0.56;
    // wake: fading streaks trailing behind the log
    const back = -lane.dir;
    ctx.fillStyle="rgba(255,255,255,0.16)";
    for (let k=0;k<3;k++){
      const wx = x + back*(w/2 + T*0.08 + k*T*0.16);
      const wy = y + (k===1 ? -h*0.22 : k===2 ? h*0.22 : 0);
      rr(ctx, wx - T*0.09, wy-1.5, (T*0.18)*(1-k*0.25), 3, 1.5); ctx.fill();
    }
    ctx.fillStyle="rgba(0,0,0,0.14)"; rr(ctx,x-w/2+3,y-h/2+5,w,h,h/2); ctx.fill();
    ctx.fillStyle="#8a5a2b"; rr(ctx,x-w/2,y-h/2,w,h,h/2); ctx.fill();
    ctx.fillStyle="#734a22";
    for (let i=1;i<lg.len;i++){ const gx=x-w/2+w*i/lg.len; ctx.fillRect(gx-1.5,y-h/2+4,3,h-8); }
    ctx.fillStyle="#c79a5f";
    ctx.beginPath(); ctx.ellipse(x-w/2+6,y,5,h*0.32,0,0,7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+w/2-6,y,5,h*0.32,0,0,7); ctx.fill();
  },
  drawRail(lane,row,top) {
    const ctx=this.ctx, T=this.TILE, W=this.W;
    ctx.fillStyle="#5a5148"; ctx.fillRect(0,top,W,T+1);
    // sleepers
    ctx.fillStyle="#6f6458"; for (let x=0;x<W;x+=T*0.5) ctx.fillRect(x+4,top+8,T*0.32,T-16);
    // rails
    ctx.fillStyle="#c9ccd2"; ctx.fillRect(0,top+T*0.32,W,4); ctx.fillRect(0,top+T*0.62,W,4);
    // train
    if (lane.phase==="train"){ const [x,y]=this.screen(lane.train.x,row);
      const w=6*T, h=T*0.8;
      ctx.fillStyle="rgba(0,0,0,0.28)"; rr(ctx,x-w/2+5,y-h/2+6,w,h,10); ctx.fill();
      ctx.fillStyle="#c0392b"; rr(ctx,x-w/2,y-h/2,w,h,10); ctx.fill();
      ctx.fillStyle="#e2554a"; ctx.fillRect(x-w/2,y-h/2,w,6);
      ctx.fillStyle="#ffe08a";
      for (let i=0;i<6;i++) rr(ctx,x-w/2+18+i*(w-36)/6,y-h*0.28,(w-36)/6-8,h*0.32,4), ctx.fill();
      // front light
      ctx.fillStyle="#fff6c8"; const fx=lane.dir>0?x+w/2-6:x-w/2+2; ctx.fillRect(fx,y-6,5,12);
    }
    // warning lights + gates
    const on = (lane.phase==="warn"||lane.phase==="train");
    const flash = on && (Math.floor(lane.blink*6)%2===0);
    [-1,1].forEach(side=>{
      const gx = side<0 ? this.X0+T*0.5 : this.X0+COLS*T-T*0.5;
      // pole
      ctx.fillStyle="#333"; ctx.fillRect(gx-3, top+2, 6, T*0.5);
      // lamp
      ctx.beginPath(); ctx.arc(gx, top+8, 6, 0, 7);
      ctx.fillStyle = flash ? "#ff2d2d" : (on?"#7a1414":"#801a1a"); ctx.fill();
      // gate arm rotating down
      const a = lane.gate * (Math.PI/2); // 0 up -> down
      ctx.save(); ctx.translate(gx, top+T*0.5);
      ctx.rotate(side<0 ? a : -a);
      const len = T*1.6;
      ctx.fillStyle="#fff"; rr(ctx,0,-4, side<0?len:0, 8, 3);
      // draw arm toward center
      ctx.fillStyle="#e23b3b";
      for (let i=0;i<5;i++){ const seg=len/5; const sx=(side<0? i*seg : -(i+1)*seg);
        ctx.fillStyle = i%2===0 ? "#e23b3b":"#ffffff"; rr(ctx,sx,-4,seg,8,2); ctx.fill(); }
      ctx.restore();
    });
  },
  drawCoin(coin,row) {
    const ctx=this.ctx, T=this.TILE, [x,y0]=this.screen(coin.col,row);
    const bob=Math.sin(this.elapsed*4+coin.bob)*3, y=y0+bob;
    ctx.fillStyle="rgba(0,0,0,0.18)"; ctx.beginPath(); ctx.ellipse(x,y0+T*0.28,T*0.16,T*0.07,0,0,7); ctx.fill();
    ctx.fillStyle="#f6c531"; ctx.beginPath(); ctx.arc(x,y,T*0.2,0,7); ctx.fill();
    ctx.fillStyle="#ffe58a"; ctx.beginPath(); ctx.arc(x,y,T*0.14,0,7); ctx.fill();
    ctx.fillStyle="#d99a1a"; ctx.font=`900 ${T*0.22}px system-ui`; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("★",x,y+1);
  },
  drawChick() {
    const ctx=this.ctx, T=this.TILE, c=this.chick;
    const sk = SKINS[this.profile && this.profile.avatar] || SKINS["🐔"];
    let [x,yBase]=this.screen(c.col,c.row);
    // riding a log: bob with the lane so bird and log move as one
    const under=this.world[c.row];
    if (under && under.type==="water" && c.hop>=1 && !this.dead) yBase += this.waterBob(c.row);
    const arc = c.hop<1 ? Math.sin(Math.PI*c.hop) : 0;
    let y = yBase - arc*T*0.42, sx=1, sy=1;
    if (c.hop<1){ sy=1+arc*0.18; sx=1-arc*0.12; }
    // Water deaths used to play the road-squash flatten, which read as being run
    // over by the river. Drowning sinks instead: the bird drops below the
    // surface, shrinks with the depth and fades out, leaving ripples behind.
    // "fell" covers both being swept off a log and being left behind by the
    // camera, so check the lane rather than the reason -- falling behind on a
    // road should still squash, not sink into the tarmac.
    const drown = this.dead && (this.deathReason==="water" ||
      (this.deathReason==="fell" && under && under.type==="water"));
    let t=0;
    if (this.dead){
      t=Math.min(1,(performance.now()-(this._deadAt||(this._deadAt=performance.now())))/(drown?600:300));
      if (drown){ const k=1-t*0.45; sx=k; sy=k; y=yBase+t*T*0.5; }
      else { sy=1-t*0.7; sx=1+t*0.5; y=yBase; }
    }
    if (!this.dead) this._deadAt=0;
    const s=T*0.5;
    // shadow -- nothing to cast one onto once the bird is under the surface
    if (!drown){
      ctx.fillStyle="rgba(0,0,0,0.2)"; ctx.beginPath();
      ctx.ellipse(x,yBase+s*0.42,s*0.42*(1+arc*0.15),s*0.18,0,0,7); ctx.fill();
    }
    // invincible blink
    if (this.invince>0 && Math.floor(this.invince*10)%2===0){ return; }
    // refused-move lean: body only, so the shadow anchors it to the tile
    let lx=0, ly=0;
    if (this.bumpT>0 && !this.dead){ const l=Math.sin(Math.PI*(1-this.bumpT))*T*0.15;
      lx=this.bumpX*l; ly=-this.bumpY*l; }
    ctx.save(); ctx.translate(x+lx,y+ly); ctx.scale(sx,sy);
    // sinking below the surface: hold full opacity for the first moments so the
    // drop is legible, then fade the bird out as the water closes over it
    if (drown) ctx.globalAlpha = Math.max(0, 1 - Math.max(0, t-0.3)/0.7);
    // legs
    ctx.strokeStyle=sk.legs; ctx.lineWidth=Math.max(2,s*0.09); ctx.lineCap="round";
    const lb = sk.longLegs ? s*0.52 : s*0.46;
    ctx.beginPath(); ctx.moveTo(-s*0.14,s*0.34); ctx.lineTo(-s*0.14,lb);
    ctx.moveTo(s*0.14,s*0.34); ctx.lineTo(s*0.14,lb); ctx.stroke();
    // tail plume behind the body (rooster, peacock)
    if (sk.tail){ ctx.fillStyle=sk.tail; ctx.beginPath();
      ctx.ellipse(-s*0.44,-s*0.1,s*0.17,s*0.3,-0.5,0,7); ctx.fill(); }
    // body, belly, shading
    ctx.fillStyle=sk.body; rr(ctx,-s*0.4,-s*0.28,s*0.8,s*0.66,s*0.28); ctx.fill();
    if (sk.belly){ ctx.fillStyle=sk.belly; rr(ctx,-s*0.24,-s*0.12,s*0.48,s*0.46,s*0.2); ctx.fill(); }
    ctx.fillStyle=sk.shade; rr(ctx,-s*0.4,0,s*0.8,s*0.38,s*0.24); ctx.fill();
    // head, neck ring (duck), face disc + ear tufts (owl)
    ctx.fillStyle=sk.head||sk.body; rr(ctx,-s*0.26,-s*0.5,s*0.52,s*0.4,s*0.2); ctx.fill();
    if (sk.ring){ ctx.fillStyle=sk.ring; rr(ctx,-s*0.26,-s*0.16,s*0.52,s*0.07,s*0.03); ctx.fill(); }
    if (sk.disc){ ctx.fillStyle=sk.disc; rr(ctx,-s*0.21,-s*0.47,s*0.42,s*0.3,s*0.14); ctx.fill(); }
    if (sk.tufts){ ctx.fillStyle=sk.tufts; ctx.beginPath();
      ctx.moveTo(-s*0.24,-s*0.44); ctx.lineTo(-s*0.16,-s*0.62); ctx.lineTo(-s*0.08,-s*0.48);
      ctx.moveTo(s*0.08,-s*0.48); ctx.lineTo(s*0.16,-s*0.62); ctx.lineTo(s*0.24,-s*0.44);
      ctx.fill(); }
    // comb + wattle (chickens), head tuft (chick, parrot), crown (peacock)
    if (sk.comb){ ctx.fillStyle=sk.comb; ctx.beginPath();
      ctx.arc(-s*0.06,-s*0.52,s*0.09,0,7); ctx.arc(s*0.06,-s*0.55,s*0.09,0,7);
      if (sk.bigComb) ctx.arc(-s*0.17,-s*0.49,s*0.08,0,7);
      ctx.fill(); }
    if (sk.wattle){ ctx.fillStyle=sk.wattle; rr(ctx,-s*0.03,-s*0.2,s*0.08,s*0.12,3); ctx.fill(); }
    if (sk.tuft){ ctx.fillStyle=sk.tuft; ctx.beginPath();
      ctx.arc(0,-s*0.56,s*0.07,0,7); ctx.arc(s*0.1,-s*0.53,s*0.055,0,7); ctx.fill(); }
    if (sk.crown){ ctx.strokeStyle=sk.crown; ctx.lineWidth=Math.max(1.5,s*0.04); ctx.beginPath();
      for (const dx of [-0.12,0,0.12]){ ctx.moveTo(dx*s,-s*0.5); ctx.lineTo(dx*s,-s*0.62); }
      ctx.stroke();
      ctx.fillStyle=sk.crown; ctx.beginPath();
      for (const dx of [-0.12,0,0.12]){ ctx.moveTo(dx*s+s*0.045,-s*0.64); ctx.arc(dx*s,-s*0.64,s*0.045,0,7); }
      ctx.fill(); }
    // beak: flat bill (duck/swan) or pointy triangle, optional dark tip (flamingo)
    if (sk.flatBill){ ctx.fillStyle=sk.beak; rr(ctx,s*0.16,-s*0.34,s*0.3,s*0.13,s*0.06); ctx.fill(); }
    else { ctx.fillStyle=sk.beak; ctx.beginPath();
      ctx.moveTo(s*0.2,-s*0.34); ctx.lineTo(s*0.42,-s*0.28); ctx.lineTo(s*0.2,-s*0.22); ctx.closePath(); ctx.fill();
      if (sk.beakTip){ ctx.fillStyle=sk.beakTip; ctx.beginPath();
        ctx.moveTo(s*0.33,-s*0.305); ctx.lineTo(s*0.42,-s*0.28); ctx.lineTo(s*0.33,-s*0.245); ctx.closePath(); ctx.fill(); } }
    if (sk.mask){ ctx.fillStyle=sk.mask; ctx.beginPath(); ctx.arc(s*0.19,-s*0.28,s*0.06,0,7); ctx.fill(); }
    // eyes
    if (sk.bigEyes){
      ctx.fillStyle="#fff"; ctx.beginPath();
      ctx.arc(-s*0.02,-s*0.34,s*0.1,0,7); ctx.moveTo(s*0.26,-s*0.34); ctx.arc(s*0.16,-s*0.34,s*0.1,0,7); ctx.fill();
      ctx.fillStyle="#222"; ctx.beginPath(); ctx.arc(-s*0.02,-s*0.34,s*0.05,0,7); ctx.fill();
      ctx.beginPath(); ctx.arc(s*0.16,-s*0.34,s*0.05,0,7); ctx.fill();
    } else {
      ctx.fillStyle="#222"; ctx.beginPath(); ctx.arc(s*0.02,-s*0.36,s*0.05,0,7); ctx.fill();
      ctx.beginPath(); ctx.arc(s*0.16,-s*0.36,s*0.05,0,7); ctx.fill();
    }
    if (this.dead){ ctx.strokeStyle="#222"; ctx.lineWidth=s*0.05; ctx.beginPath();
      ctx.moveTo(-s*0.02,-s*0.4); ctx.lineTo(s*0.06,-s*0.32); ctx.moveTo(s*0.06,-s*0.4); ctx.lineTo(-s*0.02,-s*0.32);
      ctx.moveTo(s*0.12,-s*0.4); ctx.lineTo(s*0.2,-s*0.32); ctx.moveTo(s*0.2,-s*0.4); ctx.lineTo(s*0.12,-s*0.32); ctx.stroke(); }
    ctx.restore();
    // ripples last, so they spread across the surface the bird went under
    if (drown) this.drawRipples(x, yBase, t);
  },

  // Three rings staggered in time, each expanding and thinning as it fades --
  // the tell that the bird went into the water rather than under a truck.
  drawRipples(x, y, t) {
    const ctx=this.ctx, T=this.TILE;
    ctx.save();
    ctx.strokeStyle="#ffffff";
    for (let i=0;i<3;i++){
      const p = t - i*0.18;
      if (p<=0) continue;
      const r = T*(0.12 + p*0.42);
      ctx.globalAlpha = Math.max(0, 0.7*(1-p));
      ctx.lineWidth = Math.max(1.5, T*0.035*(1-p*0.6));
      ctx.beginPath(); ctx.ellipse(x, y, r, r*0.42, 0, 0, 7); ctx.stroke();
    }
    ctx.restore();
  },
};

/* Per-avatar sprite skins — the playable character matches the profile avatar. */
const SKINS = {
  "🐔": { body:"#fff",    shade:"rgba(0,0,0,0.06)",       beak:"#f0a500", legs:"#f0a500", comb:"#e8403a", wattle:"#e8403a" },
  "🐓": { body:"#f6ede1", shade:"rgba(140,60,20,0.18)",   beak:"#f0a500", legs:"#e8952f", comb:"#d93025", wattle:"#d93025", bigComb:true, tail:"#2e7d4f" },
  "🐤": { body:"#ffd93b", shade:"rgba(0,0,0,0.07)",       beak:"#f28c28", legs:"#f28c28" },
  "🐥": { body:"#ffe066", shade:"rgba(0,0,0,0.05)",       beak:"#f28c28", legs:"#f28c28", tuft:"#f9a825" },
  "🦆": { body:"#9c8f80", shade:"rgba(0,0,0,0.10)",       beak:"#fdd835", legs:"#f28c28", head:"#2e7d32", ring:"#fff", flatBill:true },
  "🐧": { body:"#263238", shade:"rgba(0,0,0,0.2)",        beak:"#f28c28", legs:"#f28c28", belly:"#fff" },
  "🦉": { body:"#8d6e63", shade:"rgba(0,0,0,0.12)",       beak:"#fdd835", legs:"#a1887f", disc:"#d7ccc8", bigEyes:true, tufts:"#6d4c41" },
  "🦩": { body:"#f48fb1", shade:"rgba(0,0,0,0.07)",       beak:"#f8bbd0", legs:"#ec407a", beakTip:"#37474f", longLegs:true },
  "🦜": { body:"#e53935", shade:"rgba(25,50,160,0.28)",   beak:"#eceff1", legs:"#78909c", tuft:"#fdd835" },
  "🦚": { body:"#00897b", shade:"rgba(13,71,161,0.28)",   beak:"#f0a500", legs:"#455a64", head:"#1565c0", tail:"#43a047", crown:"#1565c0" },
  "🦢": { body:"#fff",    shade:"rgba(0,0,0,0.05)",       beak:"#f57f17", legs:"#455a64", flatBill:true, mask:"#212121" },
  "🕊️": { body:"#eceff1", shade:"rgba(120,144,156,0.25)", beak:"#f9a825", legs:"#e57373" },

/* -------------------------------------------------------------------- App */
// Profiles, PINs, delete flow and the leaderboard renderer all come from
// gamekit (GK.Profiles); App keeps only what is Chicken-Cross-specific.
const AVATARS = ["🐔","🐤","🦆","🐧","🦉","🦩","🐓","🦜","🐥","🦚","🦢","🕊️"];

const App = {
  profile:null, screen:"splash",
  el(id){ return document.getElementById(id); },

  init() {
    Sfx.enabled = Storage.getSettings().sound;
    GK.UI.onScreenChange = (name) => {
      this.screen = name;
      Game.active = (name === "game");
      if (name === "splash") this.refreshSplash();
    };
    GK.UI.bindSoundToggle(Storage);
    GK.Profiles.init({
      storage: Storage,
      avatars: AVATARS,
      meta: (p, g) => `🏁 best ${g.best} · 🪙 ${g.coins} · 🗺️ ${levelsDone(g)}/${LEVELS.length}`,
      onEnter: (p) => { this.profile = p; this.showMap(); },
      addLabel: "New Player",
    });
    GK.initPWA({ appName: "Chicken Cross" });
    Game.boot();
    this.el("lb-back").onclick = () => this.showScreen(this.profile?"map":"splash");
    this.refreshSplash();
    // Firestore sync runs in the background; the game is playable immediately.
    Storage.initFirebase().then(ok => {
      this.el("sync-badge").textContent = ok ? "☁️ synced" : "📴 offline";
      // refresh whatever the player is looking at with the merged data
      if (ok && this.screen === "profiles") GK.Profiles.renderList();
      if (ok && this.screen === "splash") this.refreshSplash();
    });
  },

  showScreen(name) { GK.UI.showScreen(name); },

  // One-tap "Continue as <last player>" on the splash; Play becomes Switch.
  refreshSplash() {
    const last = GK.Profiles.lastProfile();
    const cont = this.el("btn-continue-as"), play = this.el("btn-play");
    if (last) {
      cont.style.display = "";
      cont.textContent = `▶ Continue as ${last.avatar} ${last.name}`;
      cont.onclick = () => { Sfx.init(); GK.Profiles.select(last); };
      play.className = "btn blue wide"; play.textContent = "👥 Switch Player";
    } else {
      cont.style.display = "none";
      play.className = "btn green wide"; play.textContent = "▶ Play";
    }
  },

  play() { Sfx.init(); Sfx.click(); GK.Profiles.renderList(); this.showScreen("profiles"); },

  /* ----- map ----- */
  showMap() {
    if (!this.profile) return this.play();
    const g=Storage.getProgress(this.profile.id), unlocked=unlockedLevel(g);
    this.el("map-player").innerHTML=`${this.profile.avatar} ${esc(this.profile.name)}
      <span class="pmeta">🪙 ${g.coins} · 🏁 ${g.best}</span>`;
    const wrap=this.el("world-list"); wrap.innerHTML="";
    WORLDS.forEach((world,wi)=>{
      const start=wi*LEVELS_PER_WORLD;
      const done=LEVELS.slice(start,start+LEVELS_PER_WORLD).filter(l=>g.levels[l.gi]).length;
      const wUnlocked = start<=unlocked;
      const card=document.createElement("div"); card.className="world-card"+(wUnlocked?"":" locked");
      card.style.setProperty("--wa", world.accent);
      const dots=[];
      for (let j=0;j<LEVELS_PER_WORLD;j++){ const gi=start+j; const lv=LEVELS[gi];
        const rec=g.levels[gi];
        const cls = rec?"done":(gi===unlocked?"next":(gi<unlocked?"done":"locked"));
        const label = rec ? "★".repeat(rec.stars) : (gi<=unlocked?"▶":"🔒");
        dots.push(`<button class="lvl-dot ${cls}" data-gi="${gi}" ${gi>unlocked?"disabled":""}>${label}<small>${lv.target}m</small></button>`);
      }
      card.innerHTML=`<div class="world-head"><span class="world-emoji">${world.emoji}</span>
        <div><div class="world-name">${world.name}</div>
        <div class="world-tag">${wUnlocked?"Reach the far side!":"Finish earlier worlds to unlock"}</div></div>
        <span class="world-count">${done}/${LEVELS_PER_WORLD}</span></div>
        <div class="dots">${dots.join("")}</div>`;
      wrap.appendChild(card);
    });
    wrap.querySelectorAll(".lvl-dot:not([disabled])").forEach(b=>{
      b.onclick=()=>{ Sfx.click(); this.startLevel(+b.dataset.gi); };
    });
    this.showScreen("map");
  },

  startLevel(gi) {
    const lv=LEVELS[gi];
    Game.begin({ mode:"level", level:lv, target:lv.target, params:lv.params });
  },
  startEndless() {
    Sfx.click();
    // hardest params for a proper endless challenge
    const params={ weights:{ grass:0.32, road:0.40, water:0.16, rail:0.12 },
      theme:WORLDS[4].theme, carMin:2.0, carMax:4.2, truckChance:0.3, creep:0.6, coinRate:0.4, railFast:15 };
    Game.begin({ mode:"endless", params, target:0 });
  },

  /* ----- result modal ----- */
  showResult(res) {
    const sheet=this.el("result-sheet");
    if (res.type==="win") {
      const next = Game.level.gi+1;
      const hasNext = next<LEVELS.length;
      sheet.innerHTML=`<h2>${Game.level.world.emoji} Level Complete!</h2>
        <div class="stars">${"★".repeat(res.stars)}${"☆".repeat(3-res.stars)}</div>
        <p>🪙 ${res.coins} coins collected</p>
        <div class="row-btns2">
          <button class="btn grey" id="r-map">🗺️ Map</button>
          <button class="btn blue" id="r-retry">↻ Retry</button>
          ${hasNext?`<button class="btn green" id="r-next">Next ▶</button>`:``}
        </div>`;
      this.openModal("result-modal");
      this.el("r-map").onclick=()=>{ Sfx.click(); Game.exitToMap(); };
      this.el("r-retry").onclick=()=>{ Sfx.click(); this.startLevel(Game.level.gi); };
      if (hasNext) this.el("r-next").onclick=()=>{ Sfx.click(); this.startLevel(next); };
    } else {
      const reason = { car:"🚗 Squashed!", train:"🚂 Flattened by a train!", water:"💦 Splash!", fell:"🌀 Swept away!" }[res.reason]||"Game Over";
      const g=Storage.getProgress(this.profile.id);
      const canRevive = Game.mode!=="level" ? g.coins>=REVIVE_COST : g.coins>=REVIVE_COST;
      sheet.innerHTML=`<h2>${reason}</h2>
        <div class="bigscore">${res.dist} m</div>
        <p>🏁 Best: ${g.best} m · 🪙 ${res.coins} this run</p>
        <div class="row-btns2">
          <button class="btn grey" id="r-map">🗺️ Map</button>
          <button class="btn blue" id="r-retry">↻ Retry</button>
        </div>
        ${canRevive?`<button class="btn green wide" id="r-revive" style="margin-top:10px">💛 Continue for 🪙${REVIVE_COST}</button>`:``}`;
      this.openModal("result-modal");
      this.el("r-map").onclick=()=>{ Sfx.click(); Game.exitToMap(); };
      this.el("r-retry").onclick=()=>{ Sfx.click();
        if (Game.mode==="level") this.startLevel(Game.level.gi); else this.startEndless(); };
      if (canRevive) this.el("r-revive").onclick=()=>{ Sfx.click(); if(!Game.revive()) this.toast("Not enough coins"); };
    }
  },

  /* ----- leaderboard ----- */
  showLeaderboard() {
    Sfx.init(); Sfx.click();
    GK.Profiles.renderLeaderboard("lb-rows", {
      cols: r => `<span class="lb-stat">🗺️ ${levelsDone(r.progress)}</span>
        <span class="lb-stat">🏁 ${r.progress.best||0}m · 🪙 ${r.progress.coins||0}</span>`,
      sort: (a,b) => (b.progress.best||0)-(a.progress.best||0) || levelsDone(b.progress)-levelsDone(a.progress),
      meId: this.profile?.id,
      empty: "No players yet — tap Play to begin!",
    });
    this.showScreen("leaderboard");
  },

  /* ----- misc ----- */
  openModal(id){ GK.UI.openModal(id); },
  closeModal(id){ GK.UI.closeModal(id); },
  toast(msg){ GK.UI.toast(msg); },
};

/* --------------------------------------------------------------- helpers */
// shared helpers come from gamekit; rr (canvas round-rect path) is game-specific
const CAR_COLORS=["#e94f4f","#f0a53b","#4f7fe9","#8e4fe9","#3bc4b0","#e94f9d","#f2d13b"];
const { esc, clamp, lerp, rand, irand, pick, shade, hash2 } = GK.util;
function rr(ctx,x,y,w,h,r){ r=Math.min(r,Math.abs(w)/2,Math.abs(h)/2); ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

// expose for inline handlers
window.App=App; window.Game=Game;
window.addEventListener("DOMContentLoaded", ()=>App.init());
})();
</script>
